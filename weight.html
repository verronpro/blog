---
layout: default
title: Weight Tracker
---

<style>
    .weight-card {
        margin: 2rem 0;
        padding: 1.5rem;
        background: var(--cc-surface);
        border: 1px solid var(--cc-border);
        border-radius: 4px;
    }
    .weight-card h1 {
        text-align: center;
        margin-top: 0;
        color: var(--cc-primary);
    }
    .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .input-group input {
        padding: 8px 12px;
        font-size: 16px;
        background: var(--cc-bg);
        color: var(--cc-text);
        border: 1px solid var(--cc-border);
        border-radius: 4px;
        flex: 1;
    }
    .input-group input[type="date"] {
        flex: 2;
        min-width: 150px;
    }
    .input-group .btn {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        flex: 0.5;
        min-width: 100px;
        text-align: center;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn-add { background: var(--cc-primary); color: #fff; }
    .btn-clear { background: #DC322F; color: #fff; }
    .btn-export { background: #268BD2; color: #fff; }
    .btn-import { background: #B58900; color: #fff; }

    .btn:hover { filter: brightness(1.1); }

    .chart-container {
        position: relative;
        height: 400px;
        width: 100%;
        margin: 20px 0;
        background: var(--cc-bg);
        border: 1px solid var(--cc-border);
        border-radius: 4px;
        padding: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid var(--cc-border);
        padding: 10px;
        text-align: center;
    }
    thead th {
        background: var(--cc-surface);
        color: var(--cc-text);
        font-weight: bold;
    }
    tbody tr:nth-child(even) {
        background: rgba(128, 128, 128, 0.05);
    }
    .note {
        font-size: 0.9em;
        color: var(--cc-muted);
        margin-top: 15px;
        text-align: center;
        line-height: 1.5;
    }
    .note strong { color: var(--cc-text); }

    @media (max-width: 600px) {
        .input-group {
            flex-direction: column;
        }
        .input-group input, .input-group .btn {
            width: 100%;
            flex: none;
        }
    }
</style>

<div class="weight-card">
    <h1>📉 Weight Tracker – Target 90 kg</h1>
    <div class="input-group">
        <input type="date" id="dateInput" aria-label="Date"/>
        <input type="number" id="weightInput" step="0.1" placeholder="Weight (kg)" aria-label="Weight"/>
        <button class="btn btn-add" onclick="addEntry()">Add Entry</button>
        <button class="btn btn-clear" onclick="clearData()">Clear All</button>
        <button class="btn btn-export" onclick="exportData()">Export</button>
        <button class="btn btn-import" onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)" accept=".json,.xml" />
    </div>

    <div class="chart-container">
        <canvas id="weightChart"></canvas>
    </div>

    <h3>📋 Recent Entries</h3>
    <table id="entriesTable">
        <thead>
            <tr><th>Date</th><th>Weight (kg)</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="note">
        ⚡ The chart shows your daily weigh‑ins (dots), and a <strong>7‑day moving average</strong> (line).<br>
        🔴 The dashed red horizontal line is your <strong>90 kg goal</strong>.
    </div>
</div>

<!-- Chart.js and Plugins -->
<script src="/blog/assets/js/chart_v3.9.1.js"></script>
<script src="/blog/assets/js/chartjs-plugin-annotation_v1.4.0.js"></script>

<script>
    // ===== Data handling using localStorage =====
    const STORAGE_KEY = 'weightData';
    let weightData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function sortData() {
        weightData.sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    sortData();

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(weightData));
    }

    function addEntry() {
        const dateInput = document.getElementById('dateInput');
        const weightInput = document.getElementById('weightInput');
        const date = dateInput.value;
        const weight = parseFloat(weightInput.value);

        if (!date || isNaN(weight)) {
            alert('Please enter both date and weight.');
            return;
        }

        const existingIndex = weightData.findIndex(entry => entry.date === date);
        if (existingIndex === -1) {
            weightData.push({date, weight});
        } else {
            weightData[existingIndex].weight = weight;
        }

        sortData();
        saveData();
        updateUI();

        dateInput.value = new Date().toISOString().split('T')[0];
        weightInput.value = '';
    }

    function clearData() {
        if (confirm('Delete all weight entries?')) {
            weightData = [];
            saveData();
            updateUI();
        }
    }

    function exportData() {
        const dataStr = JSON.stringify(weightData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `weight_data_${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            if (file.name.toLowerCase().endsWith('.xml')) {
                handleAppleHealthXML(content);
            } else {
                handleJSONImport(content);
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function handleJSONImport(content) {
        try {
            const data = JSON.parse(content);
            if (Array.isArray(data)) {
                const isValid = data.every(entry => entry.date && typeof entry.weight === 'number');
                if (isValid) {
                    if (confirm(`Import ${data.length} entries? This will merge with current data.`)) {
                        mergeData(data);
                    }
                } else { alert('Invalid JSON format.'); }
            } else { alert('Invalid JSON format.'); }
        } catch (err) { alert('Error parsing JSON: ' + err.message); }
    }

    function handleAppleHealthXML(content) {
        const recordRegex = /<Record type="HKQuantityTypeIdentifierBodyMass"([^>]*)\/>/g;
        const valueRegex = /value="([^"]*)"/;
        const dateRegex = /startDate="([^"]*)"/;
        const newEntries = [];
        let match;
        while ((match = recordRegex.exec(content)) !== null) {
            const attrs = match[1];
            const valueMatch = attrs.match(valueRegex);
            const dateMatch = attrs.match(dateRegex);
            if (valueMatch && dateMatch) {
                const weight = parseFloat(valueMatch[1]);
                const dateStr = new Date(dateMatch[1]).toISOString().split('T')[0];
                if (!isNaN(weight) && dateStr !== 'NaN-aN-aN') {
                    newEntries.push({ date: dateStr, weight: weight });
                }
            }
        }
        if (newEntries.length > 0) {
            newEntries.sort((a, b) => new Date(a.date) - new Date(b.date));
            if (confirm(`Found ${newEntries.length} records. Import them?`)) { mergeData(newEntries); }
        } else { alert('No weight records found.'); }
    }

    function mergeData(newEntries) {
        newEntries.forEach(newEntry => {
            const existingIndex = weightData.findIndex(e => e.date === newEntry.date);
            if (existingIndex === -1) { weightData.push(newEntry); }
            else { weightData[existingIndex].weight = newEntry.weight; }
        });
        sortData();
        saveData();
        updateUI();
        alert('Import successful.');
    }

    // ===== Chart =====
    let chart = null;

    function getThemeColors() {
        const style = getComputedStyle(document.documentElement);
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        return {
            text: style.getPropertyValue('--cc-text').trim() || (isDark ? '#E6E6E6' : '#073642'),
            border: style.getPropertyValue('--cc-border').trim() || (isDark ? '#2A2A2A' : '#93A1A1'),
            primary: style.getPropertyValue('--cc-primary').trim() || '#30D000',
            muted: style.getPropertyValue('--cc-muted').trim() || (isDark ? '#A3A3A3' : '#657B83'),
            grid: isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.1)'
        };
    }

    function renderChart() {
        const ctx = document.getElementById('weightChart').getContext('2d');
        const colors = getThemeColors();

        if (chart) { chart.destroy(); }

        if (weightData.length === 0) {
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { plugins: { title: { display: true, text: 'No data yet', color: colors.text } } }
            });
            return;
        }

        const labels = weightData.map(entry => entry.date);
        const weightValues = weightData.map(entry => entry.weight);
        const movingAvgValues = [];
        for (let i = 0; i < weightValues.length; i++) {
            const start = Math.max(0, i - 6);
            const sum = weightValues.slice(start, i + 1).reduce((acc, val) => acc + val, 0);
            movingAvgValues.push(sum / (i - start + 1));
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Daily Weight (kg)',
                        data: weightValues,
                        borderColor: 'rgba(48, 208, 0, 0.3)',
                        backgroundColor: 'rgba(48, 208, 0, 0.1)',
                        pointBackgroundColor: colors.primary,
                        pointRadius: 4,
                        tension: 0.1,
                        order: 2
                    },
                    {
                        label: '7-Day Moving Average',
                        data: movingAvgValues,
                        borderColor: '#CB4B16', // Solarized Orange
                        backgroundColor: 'transparent',
                        pointRadius: 0,
                        borderWidth: 3,
                        tension: 0.2,
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        ticks: { color: colors.text },
                        grid: { color: colors.grid }
                    },
                    y: {
                        min: Math.min(85, ...weightValues) - 2,
                        max: Math.max(100, ...weightValues) + 2,
                        ticks: { color: colors.text },
                        grid: { color: colors.grid },
                        title: { display: true, text: 'Weight (kg)', color: colors.text }
                    }
                },
                plugins: {
                    legend: { labels: { color: colors.text } },
                    annotation: {
                        annotations: {
                            goalLine: {
                                type: 'line',
                                yMin: 90,
                                yMax: 90,
                                borderColor: '#DC322F', // Solarized Red
                                borderWidth: 2,
                                borderDash: [6, 6],
                                label: {
                                    content: 'Goal: 90 kg',
                                    enabled: true,
                                    position: 'end',
                                    backgroundColor: 'rgba(220, 50, 47, 0.8)',
                                    color: '#fff'
                                }
                            }
                        }
                    }
                }
            }
        });
    }

    function updateTable() {
        const tbody = document.querySelector('#entriesTable tbody');
        tbody.innerHTML = '';
        [...weightData].reverse().forEach(entry => {
            const row = tbody.insertRow();
            row.insertCell().textContent = entry.date;
            row.insertCell().textContent = entry.weight.toFixed(1) + ' kg';
        });
    }

    function updateUI() {
        updateTable();
        renderChart();
    }

    window.onload = function() {
        // Register the plugin (global access from the CDN)
        const plugin = window['chartjs-plugin-annotation'] || window['annotationPlugin'];
        if (plugin) {
            Chart.register(plugin);
        }
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        updateUI();
    };

    // Listen for theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        renderChart();
    });
</script>
